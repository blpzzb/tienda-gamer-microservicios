spring:
  application:
    name: orden-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/db_ordenes?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8082

services:
  usuario:
    url: ${USUARIO_SERVICE_URL:http://localhost:8081}

  producto:
    url: ${TIENDA_SERVICE_URL:http://localhost:8080}

  inventario:
    url: ${INVENTARIO_SERVICE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info