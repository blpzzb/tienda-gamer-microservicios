server:
  port: 8090

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: usuario-service
              uri: http://localhost:8081
              predicates:
                - Path=/usuarios/**

            - id: tienda-gamer-service
              uri: http://localhost:8080
              predicates:
                - Path=/productos/**

            - id: orden-service
              uri: http://localhost:8082
              predicates:
                - Path=/ordenes/**

            - id: inventario-service
              uri: http://localhost:8083
              predicates:
                - Path=/inventario/**

            - id: pago-service
              uri: http://localhost:8084
              predicates:
                - Path=/pagos/**

management:
  endpoints:
    web:
      exposure:
        include: health,info